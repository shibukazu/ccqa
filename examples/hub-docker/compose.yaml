# Local verification stack: a ccqa hub container plus a placeholder demo
# app a host-run `ccqa run` can target as BASE_URL. See README.md.
services:
  hub:
    build: .
    ports:
      - "8787:8787"
    environment:
      CCQA_HUB_TOKEN: ${CCQA_HUB_TOKEN:-dev-token}
      CCQA_HUB_ENCRYPTION_KEY: ${CCQA_HUB_ENCRYPTION_KEY:?set a 32-byte hex key}
      # Optional: only needed so the hub can run triage-learning jobs, which use
      # Claude to distil graded failures into an analysis custom prompt. Leave unset if
      # you don't use learning — those jobs will fail (nothing else needs a key).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    # Specs reference ${BASE_URL} etc. — inject those via `ccqa hub var set`
    # (see README.md), not via this compose file's environment block.
    volumes:
      - hub-data:/data

  # Published on the host at http://localhost:3000 so a host-run `ccqa run`
  # can reach it directly.
  demo-app:
    image: node:24-bookworm-slim
    command: >
      node -e "
      const http = require('http');
      http.createServer((req, res) => {
        res.end('<!doctype html><html><body><h1 id=\"title\">demo app</h1></body></html>');
      }).listen(3000);
      "
    ports:
      - "3000:3000"

volumes:
  hub-data:
