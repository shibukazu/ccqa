name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        # No committed lockfile (see npm/cli#4828 — npm pins optional
        # binaries to the author's platform and breaks `npm ci` on Linux).
        # A plain `npm install` re-resolves optionalDependencies for the
        # current platform. Reproducibility is bounded by the caret
        # ranges in package.json, which is acceptable for a CLI package.
        run: npm install --no-audit --no-fund --no-save

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: E2E tests
        run: npm run test:e2e
